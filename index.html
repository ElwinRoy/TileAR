<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>AR Tile Visualizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; width: 100vw; height: 100vh; }
  #canvas-container { position: fixed; inset: 0; }
  canvas { display: block; width: 100% !important; height: 100% !important; }
  #landing { position: fixed; inset: 0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#0a0a0a; z-index:100; gap:16px; color:#fff; }
  #hud { position: fixed; inset: 0; pointer-events: none; z-index: 50; display: none; }
  #status { position:absolute; top:24px; left:50%; transform:translateX(-50%); background:#000c; color:#f0d080; padding:10px 16px; border-radius:16px; font-size:13px; }
  #reticle-ring { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:58px; height:58px; border:2px solid #f0d080aa; border-radius:50%; }
  #controls { position:absolute; bottom:24px; left:50%; transform:translateX(-50%); display:flex; gap:10px; pointer-events:all; }
  .btn { border:none; border-radius:24px; padding:12px 18px; font-weight:600; cursor:pointer; }
  #tile-size-slider { position:absolute; right:18px; top:50%; transform:translateY(-50%); pointer-events:all; height:140px; }
</style>
</head>
<body>
<div id="landing">
  <h2>AR Tile Visualizer</h2>
  <button class="btn" onclick="startAR()">START AR</button>
</div>

<div id="canvas-container"></div>

<div id="hud">
  <div id="reticle-ring"></div>
  <div id="status">Move phone slowly over floor…</div>
  <input id="tile-size-slider" type="range" min="1" max="12" value="4" step="1"/>
  <div id="controls">
    <button class="btn" onclick="resetAR()">Reset</button>
    <button class="btn" onclick="placeTile()">Place</button>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

let renderer, scene, camera;
let xrSession = null;
let xrRefSpace = null;
let viewerSpace = null;
let hitTestSource = null;
let hitTestSourceRequested = false;

let reticle;
let floorMesh = null;
let floorPlaced = false;

let tileSizeMeters = 0.3;
let currentFloorSize = 2.0;

// LOCKED world transform (never tied to phone)
let lockedPosition = new THREE.Vector3();
let lockedQuaternion = new THREE.Quaternion();

// smoothing buffer before placement
const smoothBuffer = [];
const SMOOTH_SAMPLES = 8;

function setStatus(msg){ document.getElementById('status').textContent = msg; }

// simple generated texture
function makeTileTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 512;
  const ctx = c.getContext('2d');

  ctx.fillStyle = '#c8a84b';
  ctx.fillRect(0,0,512,512);

  ctx.strokeStyle = '#6b4c1e';
  ctx.lineWidth = 5;

  const step = 128;
  for (let i=0;i<=512;i+=step){
    ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,512); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(512,i); ctx.stroke();
  }

  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

function buildFloorMesh() {
  if (floorMesh) {
    scene.remove(floorMesh);
    floorMesh.geometry.dispose();
    floorMesh.material.map?.dispose();
    floorMesh.material.dispose();
  }

  const tex = makeTileTexture();
  const repeats = currentFloorSize / tileSizeMeters;
  tex.repeat.set(repeats, repeats);

  const mat = new THREE.MeshStandardMaterial({
    map: tex,
    transparent: false,
    roughness: 0.85,
    metalness: 0.0,
    side: THREE.DoubleSide,
    polygonOffset: true,          // avoids z-fighting without lifting mesh
    polygonOffsetFactor: -1,
    polygonOffsetUnits: -1
  });

  floorMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(currentFloorSize, currentFloorSize),
    mat
  );

  floorMesh.rotation.x = -Math.PI / 2;
  floorMesh.position.copy(lockedPosition);
  floorMesh.quaternion.copy(lockedQuaternion);
  scene.add(floorMesh);
}

function initThree() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera();

  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  renderer.setClearColor(0x000000, 0);
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 1.0));
  const dl = new THREE.DirectionalLight(0xffffff, 0.35);
  dl.position.set(0,3,0);
  scene.add(dl);

  const rg = new THREE.RingGeometry(0.06, 0.09, 36);
  rg.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI / 2));
  reticle = new THREE.Mesh(rg, new THREE.MeshBasicMaterial({ color: 0xf0d080, side: THREE.DoubleSide }));
  reticle.matrixAutoUpdate = false;
  reticle.visible = false;
  scene.add(reticle);
}

function getSmoothedPose() {
  if (smoothBuffer.length === 0) return null;
  const p = new THREE.Vector3();
  for (const v of smoothBuffer) p.add(v);
  p.multiplyScalar(1 / smoothBuffer.length);
  return p;
}

window.placeTile = function placeTile() {
  if (!reticle.visible) { setStatus('Find floor first'); return; }

  const p = getSmoothedPose();
  if (!p) { setStatus('Stabilizing…'); return; }

  lockedPosition.copy(p);
  lockedQuaternion.identity(); // horizontal plane

  floorPlaced = true;
  buildFloorMesh();

  document.getElementById('reticle-ring').style.opacity = '0';
  setStatus('✓ Locked to floor');
};

window.resetAR = function resetAR() {
  floorPlaced = false;
  smoothBuffer.length = 0;
  if (floorMesh) {
    scene.remove(floorMesh);
    floorMesh.geometry.dispose();
    floorMesh.material.map?.dispose();
    floorMesh.material.dispose();
    floorMesh = null;
  }
  reticle.visible = false;
  document.getElementById('reticle-ring').style.opacity = '1';
  setStatus('Move phone slowly over floor…');
};

window.startAR = async function startAR() {
  if (!navigator.xr) return alert('WebXR not available');
  const supported = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
  if (!supported) return alert('immersive-ar not supported');

  document.getElementById('landing').style.display = 'none';
  document.getElementById('hud').style.display = 'block';

  initThree();

  xrSession = await navigator.xr.requestSession('immersive-ar', {
    requiredFeatures: ['hit-test'],
    optionalFeatures: ['dom-overlay'],
    domOverlay: { root: document.getElementById('hud') }
  });

  // critical for floor stability
  try {
    renderer.xr.setReferenceSpaceType('local-floor');
  } catch {
    renderer.xr.setReferenceSpaceType('local');
  }

  await renderer.xr.setSession(xrSession);

  xrSession.addEventListener('end', () => {
    document.getElementById('hud').style.display = 'none';
    document.getElementById('landing').style.display = 'flex';
    hitTestSource = null;
    hitTestSourceRequested = false;
    viewerSpace = null;
    xrRefSpace = null;
  });

  document.getElementById('tile-size-slider').addEventListener('input', (e) => {
    currentFloorSize = parseFloat(e.target.value) * 0.5;
    if (floorPlaced && floorMesh) buildFloorMesh();
  });

  renderer.setAnimationLoop(onXRFrame);
};

function onXRFrame(t, frame) {
  const session = frame.session;

  if (!hitTestSourceRequested) {
    session.requestReferenceSpace('viewer').then((vs) => {
      viewerSpace = vs;
      session.requestHitTestSource({ space: viewerSpace }).then((src) => {
        hitTestSource = src;
      });
    });
    hitTestSourceRequested = true;
  }

  xrRefSpace = renderer.xr.getReferenceSpace();

  if (!floorPlaced && hitTestSource && xrRefSpace) {
    const results = frame.getHitTestResults(hitTestSource);

    if (results.length > 0) {
      const pose = results[0].getPose(xrRefSpace);
      if (pose) {
        reticle.visible = true;
        reticle.matrix.fromArray(pose.transform.matrix);

        const p = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
        smoothBuffer.push(p);
        if (smoothBuffer.length > SMOOTH_SAMPLES) smoothBuffer.shift();

        setStatus('Floor detected — tap Place');
      }
    } else {
      reticle.visible = false;
      smoothBuffer.length = 0;
      setStatus('Move phone slowly over floor…');
    }
  }

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  if (renderer) renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
